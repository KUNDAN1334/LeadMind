version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16      # Postgres 16 with pgvector pre-installed
    container_name: leadmind_postgres
    environment:
      POSTGRES_USER: leadmind
      POSTGRES_PASSWORD: leadmind123
      POSTGRES_DB: leadmind
    ports:
      - "5432:5432"                    # your machine:container
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data persists between restarts

  redis:
    image: redis:7-alpine              # lightweight Redis
    container_name: leadmind_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: